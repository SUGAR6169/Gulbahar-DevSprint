name: DevSprint Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install Dependencies & Run Tests
      working-directory: ./order-gateway
      run: |
        npm install
        npm test