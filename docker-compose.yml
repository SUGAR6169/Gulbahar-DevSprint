version: '3.8'

services:
  redis:
    image: redis:alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: iut_admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: cafeteria_db
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iut_admin -d cafeteria_db"]
      interval: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  identity-provider:
    build: ./identity-provider
    ports: ["3001:3000"]
    depends_on:
      redis:
        condition: service_healthy

  order-gateway:
    build: ./order-gateway
    ports: ["3000:3000"]
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-provider:
        condition: service_started

  stock-service:
    build: ./stock-service
    ports: ["3002:3000"]
    depends_on:
      postgres:
        condition: service_healthy

  kitchen-queue:
    build: ./kitchen-queue
    ports: ["3003:3000"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      notification-hub:
        condition: service_started

  notification-hub:
    build: ./notification-hub
    ports: ["3004:3000"]
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend-ui:
    build: ./frontend-ui
    ports: ["5173:5173"]